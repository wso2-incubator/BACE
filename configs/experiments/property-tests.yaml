# Property + Public Tests Experiment
# Uses a code-only warmup schedule (5 generations) before running property-driven phases

experiment:
  name: "property-tests"
  description: "Experiment that uses property tests and public tests only, with a simulataneous coevolution"

# Component references
llm: "llm/gpt-5-mini.yaml"
code_profile: "profiles/code/standard.yaml"
property_profile: "profiles/property/standard.yaml"
public_profile: "profiles/public/standard.yaml"
sandbox: "sandbox/sandbox-default.yaml"
schedule: "schedules/simultaneous-5.yaml"

# Dataset configuration
dataset:
  config_path: "datasets/lcb.yaml"

# Problem selection
subset:
  start_index: 0
  end_index: null
  problem_ids: null

logging:
  console_level: "DEBUG"
  file_level: "DEBUG"
  log_file_base_name: "property_"

rephraser:
  enabled: false
  n: 0

code_profile_overrides:
  llm_workers: 10
  init_pop_batch_size: 1
  k_failing_tests: 1

# Default Experiment Configuration
# Standard coevolution setup with GPT-5 Mini

experiment:
  name: "ballerina-evolution"
  description: "ballerina code evolution experiment with code-only schedule and standard code profile"

# Component references
llm: "llm/gpt-5-mini.yaml"
code_profile: "profiles/code/fix_one_test.yaml"
public_pbrofile: "profiles/public/standard.yaml"
sandbox: "sandbox/sandbox-default.yaml"
schedule: "schedules/code-only-5gen.yaml"
language: "ballerina"

# Dataset configuration
# Option 1: Reference external dataset config file
dataset:
  config_path: "datasets/humaneval_ballerina.yaml"

# Problem selection
subset:
  start_index: 0
  end_index: null  # null = process all
  problem_ids: null  # null = use index range

# Logging configuration
logging:
  console_level: "DEBUG"
  file_level: "DEBUG"
  log_file_base_name: "ballerina_evo_run"

rephraser:
  enabled: false
  n: 0


code_profile_overrides:
  llm_workers: 1
  init_pop_batch_size: 1

# Default Experiment Configuration
# Standard coevolution setup with GPT-5 Mini

experiment:
  name: "default-coevolution"
  description: "Standard coevolution experiment with balanced settings"

# Component references
llm: "llm/gpt-5-mini.yaml"
code_profile: "profiles/code/standard.yaml"
unittest_profile: "profiles/unittest/standard.yaml"
differential_profile: "profiles/differential/standard.yaml"
public_profile: "profiles/public/standard.yaml"
sandbox: "sandbox/sandbox-default.yaml"
schedule: "schedules/alternating-10gen.yaml"

# Dataset configuration
# Option 1: Reference external dataset config file
dataset:
  config_path: "datasets/lcb.yaml"

# Option 2: Inline dataset configuration (alternative to config_path)
# dataset:
#   adapter: "lcb"
#   version: "release_v6"
#   difficulty: "hard"
#   start_date: "2025-03-01"
#   end_date: "2025-05-10"

# Problem selection
subset:
  start_index: 0
  end_index: null  # null = process all
  problem_ids: null  # null = use index range

# Logging configuration
logging:
  console_level: "DEBUG"
  file_level: "DEBUG"
  log_file_base_name: "coevolution_run"

rephraser:
  enabled: false
  n: 0
# Code profile tuned for pass@1 checking
# Small population: only one candidate generated per problem

initial_prior: 0.2
initial_population_size: 1
max_population_size: 1
offspring_rate: 0.0
elitism_rate: 1.0

# Operation rates — no evolution, but keep valid defaults
mutation_rate: 0.0
crossover_rate: 0.0
generic_edit_rate: 1.0 # Will raise error if set to 0.0

# Performance settings
init_pop_batch_size: 1
llm_workers: 1

diversity_enabled: false
prob_assigner_strategy: "min"

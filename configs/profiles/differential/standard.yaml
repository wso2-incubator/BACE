# Standard Differential Test Profile
# Settings for differential test discovery

initial_prior: 0.2
initial_population_size: 0  # Bootstrap from discoveries
max_population_size: 100
offspring_rate: 0.5
elitism_rate: 0.3

# Operation rate (discovery-only initially)
discovery_rate: 1.0

# Bayesian reliability parameters
alpha: 0.1  # P(pass | code correct, test incorrect)
beta: 0.2    # P(pass | code incorrect, test correct)
gamma: 0.25  # P(pass | both incorrect)
learning_rate: 0.1

# Performance - independent scaling
llm_workers: 10   # Parallel LLM script generation
cpu_workers: 4   # Parallel sandbox execution (from env COEVOLUTION_WORKERS)

# Differential breeding strategy parameters
max_pairs_per_group: 5  # Max pairs to try per functional group (prevents excessive attempts on equivalent code)

# Probability assigner strategy: one of ["min", "mean", "max", "init"]
prob_assigner_strategy: "min"

# Standard Unittest Profile
# Settings for discrimination-driven unit test evolution

initial_prior: 0.2
initial_population_size: 20
max_population_size: 20
offspring_rate: 0.8
elitism_rate: 0.4

# Operation rates
mutation_rate: 0.3
crossover_rate: 0.2
edit_rate: 0.5

# Bayesian reliability parameters
alpha: 0.05  # P(pass | code correct, test incorrect)
beta: 0.2    # P(pass | code incorrect, test correct)
gamma: 0.3   # P(pass | both incorrect)
learning_rate: 0.1

# Performance
llm_workers: 10
diversity_enabled: true

# Google Cloud Vertex AI: GPT-OSS-120B (OpenAI-compatible endpoint)
# AI model hosted on Google Cloud's Model-as-a-Service infrastructure.

provider: "openai-chat"
model: "openai/gpt-oss-120b-maas"

# Configuration relies on environment variables:
# GOOGLE_PROJECT_ID, GOOGLE_REGION, and GOOGLE_ENDPOINT
base_url: "https://${GOOGLE_ENDPOINT}/v1/projects/${GOOGLE_PROJECT_ID}/locations/${GOOGLE_REGION}/endpoints/openapi"


# Custom flag to enable automatic Google Access Token fetching
use_vertex_auth: true

# Experiment Parameters
max_output_tokens: 100_000_000
workers: 32
